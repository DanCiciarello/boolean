<!DOCTYPE html>
<html lang="en" dir="ltr">

  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <title>Lim Sharing</title>
  </head>

  <body>

    <!-- Main container -->
    <div class="container">

      <!-- Header: logo & payoff -->
      <header>
        <img src="logo.png">
        <h1>Taking Booleaners from A to B</h1>
      </header>

      <!-- Navigation -->
      <nav>
          <button type="button">Prenota</button>
          <button type="button">Termina prenotazione</button>
          <button type="button">Accendi luci</button>
      </nav>

      <!-- List of available scooters -->
      <section>

        <!-- Scooter #1 -->
        <div class="scooter">
          <input type="checkbox">
          <span>Monopattino Gino22</span>
          <p> Via Guadalametri - a 220 metri da te<br>Stato carica:</p>
            <div class="battery mid"></div>
        </div>

        <!-- Scooter #2 -->
        <div class="scooter">
          <input type="checkbox">
          <span>Monopattino Mike24</span>
          <p> Via Ricciardoni - a 420 metri da te<br>Stato carica:</p>
            <div class="battery full"></div>
        </div>

        <!-- Scooter #3 -->
        <div class="scooter">
          <input type="checkbox">
          <span>Monopattino Fede154</span>
          <p> Via Mentarini - a 490 metri da te<br>Stato carica:</p>
            <div class="battery low"></div>
        </div>

      </section>

    </div>

  </body>

</html>
